version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  ui:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000/api
    volumes:
      - ./storage:/app/storage
    ports:
      - "8501:8501"
    depends_on:
      - api

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
